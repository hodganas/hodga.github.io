<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Кружка - Post Processing Effects</title>

  <!-- Поддержка import maps для Safari -->
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>
  
  <!-- Import map для Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@^0.182.0/build/three.module.min.js"
    }
  }
  </script>

  <!-- Подключаем модульную версию model-viewer и эффекты -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      overflow: hidden;
      touch-action: pan-y pinch-zoom;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      padding: 15px 25px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      background: #ffffff;
      color: #333;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    button:active {
      transform: scale(0.95);
    }

    button.active {
      background: #ff5500;
      color: white;
      box-shadow: 0 0 10px rgba(255,85,0,0.5);
    }

    .effect-btn {
      background: #4a4a4a;
      color: white;
    }

    .effect-btn.active {
      background: #ff5500;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      touch-action: pan-y pinch-zoom;
    }

    @media (max-width: 768px) {
      model-viewer {
        --progress-bar-height: 2px;
      }
    }
  </style>
</head>

<body>

<div id="controls">
  <button id="btnZ">🎬 Анимация Z</button>
  <button id="btnX">🚶 Анимация X</button>
  <button id="outlineBtn" class="effect-btn">✨ Контур</button>
  <button id="pixelBtn" class="effect-btn">🔳 Пикселизация</button>
</div>

<model-viewer
  id="mv"
  src="CUP.glb"
  camera-controls
  autoplay
  animation-name="z"
  animation-crossfade-duration="300"
  shadow-intensity="1"
  exposure="1"
  style="background-color: #ffffff;"
  camera-orbit="0deg 75deg 5m"
  min-camera-orbit="auto auto 2m"
  max-camera-orbit="auto auto 10m"
  interaction-prompt="none"
  ar
  ar-modes="webxr scene-viewer">
  
  <effect-composer render-mode="quality">
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>
  
</model-viewer>

<script type="module">
  (() => {
    console.log('🚀 Script started');
    
    const mv = document.getElementById('mv');
    const btnZ = document.getElementById('btnZ');
    const btnX = document.getElementById('btnX');
    const outlineBtn = document.getElementById('outlineBtn');
    const pixelBtn = document.getElementById('pixelBtn');
    
    // Получаем эффекты из effect-composer
    const outlineEffect = document.getElementById('outlineEffect');
    const pixelEffect = document.getElementById('pixelEffect');
    
    let animations = [];
    let isOutlineActive = false;
    let isPixelActive = false;
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    console.log('Effects found:', { outlineEffect, pixelEffect });
    console.log('Is mobile:', isMobile);
    
    // Функция переключения контура
    function toggleOutline() {
      if (outlineEffect) {
        if (isOutlineActive) {
          outlineEffect.blendMode = 'skip';
          isOutlineActive = false;
          outlineBtn.classList.remove('active');
          console.log('🔴 Outline OFF');
        } else {
          outlineEffect.blendMode = 'default';
          isOutlineActive = true;
          outlineBtn.classList.add('active');
          console.log('🟢 Outline ON');
        }
      }
    }
    
    // Функция переключения пикселизации
    function togglePixel() {
      if (pixelEffect) {
        if (isPixelActive) {
          pixelEffect.blendMode = 'skip';
          isPixelActive = false;
          pixelBtn.classList.remove('active');
          pixelBtn.innerHTML = '🔳 Пикселизация';
          console.log('📷 Pixel OFF');
        } else {
          pixelEffect.blendMode = 'default';
          pixelEffect.granularity = isMobile ? 20 : 15;
          isPixelActive = true;
          pixelBtn.classList.add('active');
          pixelBtn.innerHTML = '✅ Пикселизация';
          console.log('📷 Pixel ON');
        }
      }
    }
    
    // Ждем загрузки модели
    mv.addEventListener('load', () => {
      console.log('✅ Model loaded successfully');
      
      try {
        animations = mv.availableAnimations || [];
        console.log('📊 Available animations:', animations);
        
        if (animations.length >= 1) {
          if (animations.includes('z')) {
            mv.animationName = 'z';
            btnZ.classList.add('active');
            console.log('🎬 Запущена анимация: Z');
          } else if (animations.includes('x')) {
            mv.animationName = 'x';
            btnX.classList.add('active');
            console.log('🎬 Запущена анимация: X');
          } else {
            mv.animationName = animations[0];
            console.log('🎬 Запущена анимация:', animations[0]);
          }
        }
      } catch (e) {
        console.error('Error getting animations:', e);
      }
    });
    
    mv.addEventListener('error', (error) => {
      console.error('❌ Model loading error:', error);
    });
    
    // Кнопка анимации Z
    btnZ.addEventListener('click', (e) => {
      e.stopPropagation();
      mv.animationName = 'z';
      btnZ.classList.add('active');
      btnX.classList.remove('active');
      console.log('Playing animation: Z');
    });
    
    // Кнопка анимации X
    btnX.addEventListener('click', (e) => {
      e.stopPropagation();
      mv.animationName = 'x';
      btnX.classList.add('active');
      btnZ.classList.remove('active');
      console.log('Playing animation: X');
    });
    
    // Кнопка контура
    outlineBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleOutline();
    });
    
    // Кнопка пикселизации
    pixelBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePixel();
    });
    
    // Отладка в консоли
    window.debug = {
      outlineOn: () => outlineEffect?.setAttribute('blend-mode', 'default'),
      outlineOff: () => outlineEffect?.setAttribute('blend-mode', 'skip'),
      pixelOn: () => {
        pixelEffect?.setAttribute('blend-mode', 'default');
        pixelEffect?.setAttribute('granularity', '20');
      },
      pixelOff: () => pixelEffect?.setAttribute('blend-mode', 'skip'),
      setPixelSize: (size) => pixelEffect?.setAttribute('granularity', size),
      listAnimations: () => console.log('Animations:', animations),
      playAnimZ: () => { mv.animationName = 'z'; },
      playAnimX: () => { mv.animationName = 'x'; }
    };
    
    console.log('✨ Debug commands available in window.debug');
  })();
</script>

</body>
</html>
