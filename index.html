<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель с анимациями</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@^0.172.0/build/three.module.min.js"
            }
        }
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
</head>
<body>
    <model-viewer 
        id="mv" 
        src="sneg-a.glb" 
        camera-controls 
        autoplay 
        animation-crossfade-duration="300" 
        shadow-intensity="1" 
        exposure="1" 
        style="background-color: #ffffff;" 
        camera-orbit="0deg 75deg 5m" 
        min-camera-orbit="auto auto 2m" 
        max-camera-orbit="auto auto 10m" 
        interaction-prompt="none"
        tone-mapping="neutral">
    </model-viewer>

    <script>
        const mv = document.getElementById('mv');
        let animations = [];
        
        mv.addEventListener('load', () => {
            animations = mv.availableAnimations || [];
            console.log('Доступные анимации:', animations);
            
            if (animations.length >= 2) {
                let index = 0;
                mv.animationName = animations[0];
                
                setInterval(() => {
                    index = (index + 1) % animations.length;
                    mv.animationName = animations[index];
                    console.log('Анимация:', animations[index]);
                }, 1500);
            }
        });
    </script>
</body>
</html>
