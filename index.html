<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Поддержка import maps -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>
    
    <!-- Import map для Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@^0.182.0/build/three.module.min.js"
            }
        }
    </script>
    
    <!-- Подключаем model-viewer и эффекты -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; background: #f5f5f5; }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
        }
        
        button {
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        
        button:active { transform: scale(0.95); }
        .active { box-shadow: 0 0 0 2px white, 0 0 0 4px #ff5500; }
        
        .effect-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            z-index: 1000;
        }
        
        .effect-panel div {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        
        .effect-panel label { cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btnZ">Анимация Z</button>
        <button id="btnX">Анимация X</button>
    </div>
    
    <div class="effect-panel">
        <div>
            <input type="checkbox" id="outlineCheck">
            <label>Контур</label>
        </div>
        <div>
            <input type="checkbox" id="pixelateCheck">
            <label>Пикселизация</label>
        </div>
    </div>

    <model-viewer 
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        shadow-intensity="1"
        style="background: #f5f5f5;">
        
        <effect-composer render-mode="quality">
            <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
            <pixelate-effect id="pixelateEffect" granularity="15" blend-mode="skip"></pixelate-effect>
        </effect-composer>
    </model-viewer>

    <script type="module">
        const mv = document.getElementById('mv');
        const outlineEffect = document.getElementById('outlineEffect');
        const pixelateEffect = document.getElementById('pixelateEffect');
        const outlineCheck = document.getElementById('outlineCheck');
        const pixelateCheck = document.getElementById('pixelateCheck');
        
        // Переключение эффектов
        outlineCheck.addEventListener('change', (e) => {
            outlineEffect.blendMode = e.target.checked ? 'default' : 'skip';
        });
        
        pixelateCheck.addEventListener('change', (e) => {
            pixelateEffect.blendMode = e.target.checked ? 'default' : 'skip';
        });
        
        // Анимации
        document.getElementById('btnZ').onclick = () => mv.animationName = 'z';
        document.getElementById('btnX').onclick = () => mv.animationName = 'x';
        
        // Статус загрузки
        mv.addEventListener('load', () => {
            console.log('Модель загружена, анимации:', mv.availableAnimations);
        });
    </script>
</body>
</html>
