<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Подключаем model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
        }
        
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background: #f5f5f5;
            transition: all 0.3s ease;
        }
        
        /* Эффект контура через drop-shadow */
        model-viewer.outline {
            filter: drop-shadow(0 0 2px red) drop-shadow(0 0 2px red) drop-shadow(0 0 2px red);
        }
        
        /* Эффект пикселизации */
        model-viewer.pixel {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
        }
        
        button {
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        
        button:active { 
            transform: scale(0.95); 
        }
        
        button.active { 
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff5500; 
        }
        
        .effect-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }
        
        .effect-panel div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .effect-panel label { 
            cursor: pointer; 
        }
        
        .effect-panel input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btnZ">Анимация Z</button>
        <button id="btnX">Анимация X</button>
    </div>
    
    <div class="effect-panel">
        <div>
            <input type="checkbox" id="outlineCheck">
            <label>Контур</label>
        </div>
        <div>
            <input type="checkbox" id="pixelateCheck">
            <label>Пикселизация</label>
        </div>
    </div>

    <model-viewer 
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        shadow-intensity="1"
        style="background: #f5f5f5;">
    </model-viewer>

    <script>
        const mv = document.getElementById('mv');
        const btnZ = document.getElementById('btnZ');
        const btnX = document.getElementById('btnX');
        const outlineCheck = document.getElementById('outlineCheck');
        const pixelateCheck = document.getElementById('pixelateCheck');
        
        // Переключение контура
        outlineCheck.addEventListener('change', (e) => {
            if (e.target.checked) {
                mv.classList.add('outline');
            } else {
                mv.classList.remove('outline');
            }
        });
        
        // Переключение пикселизации
        pixelateCheck.addEventListener('change', (e) => {
            if (e.target.checked) {
                mv.classList.add('pixel');
            } else {
                mv.classList.remove('pixel');
            }
        });
        
        // Анимации
        btnZ.onclick = () => {
            mv.animationName = 'z';
            btnZ.classList.add('active');
            btnX.classList.remove('active');
        };
        
        btnX.onclick = () => {
            mv.animationName = 'x';
            btnX.classList.add('active');
            btnZ.classList.remove('active');
        };
        
        // Статус загрузки
        mv.addEventListener('load', () => {
            console.log('Модель загружена');
            console.log('Доступные анимации:', mv.availableAnimations);
            
            // Проверяем наличие анимаций
            if (mv.availableAnimations.includes('z')) {
                btnZ.classList.add('active');
            }
        });
        
        mv.addEventListener('error', () => {
            console.error('Ошибка: файл CUP.glb не найден');
        });
    </script>
</body>
</html>
