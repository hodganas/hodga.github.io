<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    <!-- Подключаем библиотеку Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        /* Информационная панель внизу экрана */
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            z-index: 1000;
            text-align: center;
        }
        
        /* Панель управления анимациями вверху экрана */
        .animation-controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 50px;
        }
        
        /* Стили кнопок */
        button {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-z {
            background: #4CAF50;
            color: white;
        }
        
        .btn-x {
            background: #2196F3;
            color: white;
        }
        
        /* Активная кнопка подсвечивается */
        button.active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff5500;
        }
    </style>
</head>
<body>
    <!-- Панель статуса -->
    <div id="status">
        Загрузка модели CUP.glb...
    </div>
    
    <!-- Панель управления анимациями -->
    <div class="animation-controls">
        <button id="btnZ" class="btn-z">Анимация Z</button>
        <button id="btnX" class="btn-x">Анимация X</button>
    </div>

    <!-- 3D модель с атрибутами -->
    <model-viewer 
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        animation-crossfade-duration="300"
        shadow-intensity="1"
        exposure="1"
        camera-orbit="0deg 75deg 5m"
        min-camera-orbit="auto auto 2m"
        max-camera-orbit="auto auto 10m"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        (() => {
            // Получаем элементы со страницы
            const mv = document.getElementById('mv');
            const status = document.getElementById('status');
            const btnZ = document.getElementById('btnZ');
            const btnX = document.getElementById('btnX');
            
            let animations = []; // Массив для хранения доступных анимаций
            
            // Функция обновления текста в панели статуса
            function updateStatus(message, isError = false) {
                status.textContent = message;
                status.style.background = isError ? 'rgba(255,0,0,0.9)' : 'rgba(0,0,0,0.85)';
                console.log(message);
            }
            
            // Функция подсветки активной кнопки
            function updateActiveButton(animName) {
                if (animName === 'z') {
                    btnZ.classList.add('active');
                    btnX.classList.remove('active');
                } else if (animName === 'x') {
                    btnX.classList.add('active');
                    btnZ.classList.remove('active');
                }
            }
            
            // Событие загрузки модели
            mv.addEventListener('load', () => {
                updateStatus('Модель CUP.glb загружена');
                
                try {
                    // Получаем список доступных анимаций из модели
                    animations = mv.availableAnimations || [];
                    console.log('Доступные анимации:', animations);
                    
                    if (animations.length > 0) {
                        updateStatus(`Найдено анимаций: ${animations.length} (${animations.join(', ')})`);
                        
                        // Проверяем наличие анимации z
                        if (animations.includes('z')) {
                            mv.animationName = 'z';
                            updateActiveButton('z');
                            updateStatus('Запущена анимация: Z');
                        } 
                        // Проверяем наличие анимации x
                        else if (animations.includes('x')) {
                            mv.animationName = 'x';
                            updateActiveButton('x');
                            updateStatus('Запущена анимация: X');
                        } 
                        // Если нет z и x, запускаем первую доступную
                        else if (animations.length > 0) {
                            mv.animationName = animations[0];
                            updateStatus(`Запущена анимация: ${animations[0]}`);
                        }
                    } else {
                        updateStatus('Модель загружена, но анимации не найдены');
                    }
                } catch (e) {
                    console.error('Ошибка:', e);
                    updateStatus('Ошибка при чтении анимаций', true);
                }
            });
            
            // Событие ошибки загрузки модели
            mv.addEventListener('error', (error) => {
                console.error('Ошибка загрузки:', error);
                updateStatus('Файл CUP.glb не найден! Проверьте, что файл лежит в той же папке', true);
            });
            
            // Кнопка анимации Z
            btnZ.addEventListener('click', () => {
                mv.animationName = 'z';
                updateActiveButton('z');
                updateStatus('Анимация: Z');
            });
            
            // Кнопка анимации X
            btnX.addEventListener('click', () => {
                mv.animationName = 'x';
                updateActiveButton('x');
                updateStatus('Анимация: X');
            });
            
            console.log('Модель: CUP.glb');
        })();
    </script>
</body>
</html>
