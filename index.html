<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Поддержка import maps для Safari -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>
    
    <!-- Import map для Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <!-- Используем рабочие версии из jsdelivr -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer-module.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects@3.5.0/dist/model-viewer-effects.min.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            width: auto;
            max-width: 90vw;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        #controls::-webkit-scrollbar {
            display: none;
        }
        
        button {
            padding: 10px 18px;
            cursor: pointer;
            background: #ffffff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            white-space: nowrap;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        
        button:active {
            background: #f0f0f0;
            transform: scale(0.95);
        }
        
        button.active {
            background: #ff5500;
            color: white;
            border-color: #ff5500;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            touch-action: pan-y pinch-zoom;
        }
        
        @media (max-width: 768px) {
            model-viewer {
                --progress-bar-height: 2px;
            }
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="btnZ">🎬 Анимация Z</button>
        <button id="btnX">🚶 Анимация X</button>
        <button id="outlineBtn">✨ Контур</button>
        <button id="pixelBtn">🔳 Пикселизация</button>
    </div>
    
    <model-viewer
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        animation-crossfade-duration="300"
        shadow-intensity="1"
        exposure="1"
        style="background-color: #ffffff;"
        camera-orbit="0deg 75deg 5m"
        min-camera-orbit="auto auto 2m"
        max-camera-orbit="auto auto 10m"
        interaction-prompt="none">
        
        <effect-composer>
            <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
            <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
        </effect-composer>
    </model-viewer>
    
    <script type="module">
        (() => {
            console.log('🚀 Script started');
            
            const mv = document.getElementById('mv');
            const btnZ = document.getElementById('btnZ');
            const btnX = document.getElementById('btnX');
            const outlineBtn = document.getElementById('outlineBtn');
            const pixelBtn = document.getElementById('pixelBtn');
            
            let isOutlineActive = false;
            let isPixelActive = false;
            let outlineEffect, pixelEffect;
            
            // Ждем загрузки всех компонентов
            const initEffects = async () => {
                await customElements.whenDefined('model-viewer');
                await customElements.whenDefined('effect-composer');
                
                outlineEffect = document.getElementById('outlineEffect');
                pixelEffect = document.getElementById('pixelEffect');
                
                console.log('Effects found:', { outlineEffect, pixelEffect });
            };
            
            initEffects();
            
            // Функция переключения контура
            function toggleOutline() {
                if (outlineEffect) {
                    if (isOutlineActive) {
                        outlineEffect.blendMode = 'skip';
                        isOutlineActive = false;
                        outlineBtn.classList.remove('active');
                        console.log('🔴 Outline OFF');
                    } else {
                        outlineEffect.blendMode = 'default';
                        isOutlineActive = true;
                        outlineBtn.classList.add('active');
                        console.log('🟢 Outline ON');
                    }
                }
            }
            
            // Функция переключения пикселизации
            function togglePixel() {
                if (pixelEffect) {
                    if (isPixelActive) {
                        pixelEffect.blendMode = 'skip';
                        isPixelActive = false;
                        pixelBtn.classList.remove('active');
                        pixelBtn.innerHTML = '🔳 Пикселизация';
                        console.log('📷 Pixel OFF');
                    } else {
                        pixelEffect.blendMode = 'default';
                        isPixelActive = true;
                        pixelBtn.classList.add('active');
                        pixelBtn.innerHTML = '✅ Пикселизация';
                        console.log('📷 Pixel ON');
                    }
                }
            }
            
            // Анимации
            btnZ.onclick = () => {
                mv.animationName = 'z';
                btnZ.classList.add('active');
                btnX.classList.remove('active');
                console.log('Playing animation: Z');
            };
            
            btnX.onclick = () => {
                mv.animationName = 'x';
                btnX.classList.add('active');
                btnZ.classList.remove('active');
                console.log('Playing animation: X');
            };
            
            // Эффекты
            outlineBtn.onclick = toggleOutline;
            pixelBtn.onclick = togglePixel;
            
            // Загрузка модели
            mv.addEventListener('load', () => {
                console.log('✅ Model loaded');
                console.log('Animations:', mv.availableAnimations);
                
                if (mv.availableAnimations?.includes('z')) {
                    btnZ.classList.add('active');
                }
            });
            
            mv.addEventListener('error', (e) => {
                console.error('❌ Model error:', e);
            });
        })();
    </script>
</body>
</html>
