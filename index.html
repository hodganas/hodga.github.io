<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Кружка</title>

  <!-- Подключаем model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      overflow: hidden;
      touch-action: pan-y pinch-zoom;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 20px;
      border-radius: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(5px);
      border: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      width: auto;
      max-width: 90vw;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #controls::-webkit-scrollbar {
      display: none;
    }

    button {
      padding: 10px 18px;
      cursor: pointer;
      background: #ffffff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 30px;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      white-space: nowrap;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    button:active {
      background: #f0f0f0;
      transform: scale(0.95);
    }

    button.active {
      background: #ff5500;
      color: white;
      border-color: #ff5500;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      touch-action: pan-y pinch-zoom;
    }

    /* Эффект контура - применяется к canvas модели */
    model-viewer.outline canvas {
      outline: 4px solid red;
      outline-offset: 2px;
      box-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    /* Эффект пикселизации - применяется к canvas модели */
    model-viewer.pixel canvas {
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      filter: contrast(1.5) brightness(1.1);
    }

    /* Комбо эффект */
    model-viewer.outline.pixel canvas {
      outline: 4px solid red;
      outline-offset: 2px;
      image-rendering: pixelated;
      filter: contrast(1.5) brightness(1.1);
    }

    @media (max-width: 768px) {
      model-viewer {
        --progress-bar-height: 2px;
      }
    }
  </style>
</head>

<body>

<div id="controls">
  <button id="btnZ">Анимация Z</button>
  <button id="btnX">Анимация X</button>
  <button id="outlineBtn">Контур</button>
  <button id="pixelBtn">Пикселизация</button>
</div>

<model-viewer
  id="mv"
  src="CUP.glb"
  camera-controls
  autoplay
  animation-crossfade-duration="300"
  shadow-intensity="1"
  exposure="1"
  style="background-color: #ffffff;"
  camera-orbit="0deg 75deg 5m"
  min-camera-orbit="auto auto 2m"
  max-camera-orbit="auto auto 10m"
  interaction-prompt="none">
</model-viewer>

<script>
(() => {
  console.log('Script started');
  
  const mv = document.getElementById('mv');
  const btnZ = document.getElementById('btnZ');
  const btnX = document.getElementById('btnX');
  const outlineBtn = document.getElementById('outlineBtn');
  const pixelBtn = document.getElementById('pixelBtn');

  let animations = [];
  let isOutlineActive = false;
  let isPixelActive = false;

  // Функция переключения контура
  function toggleOutline() {
    if (isOutlineActive) {
      mv.classList.remove('outline');
      isOutlineActive = false;
      outlineBtn.classList.remove('active');
      console.log('Outline OFF');
    } else {
      mv.classList.add('outline');
      isOutlineActive = true;
      outlineBtn.classList.add('active');
      console.log('Outline ON');
    }
  }

  // Функция переключения пикселизации
  function togglePixel() {
    if (isPixelActive) {
      mv.classList.remove('pixel');
      isPixelActive = false;
      pixelBtn.classList.remove('active');
      pixelBtn.innerHTML = 'Пикселизация';
      console.log('Pixel OFF');
    } else {
      mv.classList.add('pixel');
      isPixelActive = true;
      pixelBtn.classList.add('active');
      pixelBtn.innerHTML = 'Пикселизация';
      console.log('Pixel ON');
    }
  }

  // Ждем загрузки модели
  mv.addEventListener('load', () => {
    console.log('Model loaded successfully');
    
    // Получаем анимации
    try {
      animations = mv.availableAnimations || [];
      console.log('Available animations:', animations);
      
      if (animations.length >= 1) {
        if (animations.includes('z')) {
          mv.animationName = 'z';
          btnZ.classList.add('active');
          console.log('Animation started: Z');
        } else if (animations.includes('x')) {
          mv.animationName = 'x';
          btnX.classList.add('active');
          console.log('Animation started: X');
        } else {
          mv.animationName = animations[0];
          console.log('Animation started:', animations[0]);
        }
      } else {
        console.warn('No animations found');
      }
    } catch (e) {
      console.error('Error getting animations:', e);
    }
  });

  mv.addEventListener('error', (error) => {
    console.error('Model loading error:', error);
  });

  // Кнопка анимации Z
  btnZ.addEventListener('click', (e) => {
    e.stopPropagation();
    mv.animationName = 'z';
    btnZ.classList.add('active');
    btnX.classList.remove('active');
    console.log('Playing animation: Z');
  });

  // Кнопка анимации X
  btnX.addEventListener('click', (e) => {
    e.stopPropagation();
    mv.animationName = 'x';
    btnX.classList.add('active');
    btnZ.classList.remove('active');
    console.log('Playing animation: X');
  });

  // Кнопка контура
  outlineBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleOutline();
  });

  // Кнопка пикселизации
  pixelBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePixel();
  });

  // Отладка
  window.debug = {
    outlineOn: () => { mv.classList.add('outline'); isOutlineActive = true; outlineBtn.classList.add('active'); },
    outlineOff: () => { mv.classList.remove('outline'); isOutlineActive = false; outlineBtn.classList.remove('active'); },
    pixelOn: () => { mv.classList.add('pixel'); isPixelActive = true; pixelBtn.classList.add('active'); },
    pixelOff: () => { mv.classList.remove('pixel'); isPixelActive = false; pixelBtn.classList.remove('active'); },
    listAnimations: () => console.log('Animations:', animations),
    status: () => ({ outline: isOutlineActive, pixel: isPixelActive, animations })
  };

  console.log('Debug commands available in window.debug');
})();
</script>

</body>
</html>
