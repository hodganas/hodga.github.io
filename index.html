<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Подключаем model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
            transition: all 0.2s ease;
        }
        
        /* Эффект контура через фильтр */
        model-viewer.outline {
            filter: drop-shadow(0 0 3px red) drop-shadow(0 0 3px red);
        }
        
        /* Эффект пикселизации */
        model-viewer.pixel {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 18px;
            cursor: pointer;
            background: #ffffff;
            color: #333;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button.active {
            background: #ff5500;
            color: white;
        }
        
        .effect-btn {
            background: #4a4a4a;
            color: white;
        }
        
        .effect-btn.active {
            background: #ff5500;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="btnZ">Анимация Z</button>
        <button id="btnX">Анимация X</button>
        <button id="outlineBtn" class="effect-btn">Контур</button>
        <button id="pixelBtn" class="effect-btn">Пикселизация</button>
    </div>

    <model-viewer
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        shadow-intensity="1"
        exposure="1"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        // Получаем элементы
        const mv = document.getElementById('mv');
        const btnZ = document.getElementById('btnZ');
        const btnX = document.getElementById('btnX');
        const outlineBtn = document.getElementById('outlineBtn');
        const pixelBtn = document.getElementById('pixelBtn');
        
        // Состояния эффектов
        let outlineActive = false;
        let pixelActive = false;
        
        // Контур
        outlineBtn.onclick = () => {
            if (outlineActive) {
                mv.classList.remove('outline');
                outlineBtn.classList.remove('active');
                outlineActive = false;
            } else {
                mv.classList.add('outline');
                outlineBtn.classList.add('active');
                outlineActive = true;
            }
        };
        
        // Пикселизация
        pixelBtn.onclick = () => {
            if (pixelActive) {
                mv.classList.remove('pixel');
                pixelBtn.classList.remove('active');
                pixelActive = false;
            } else {
                mv.classList.add('pixel');
                pixelBtn.classList.add('active');
                pixelActive = true;
            }
        };
        
        // Анимации
        btnZ.onclick = () => {
            mv.animationName = 'z';
            btnZ.classList.add('active');
            btnX.classList.remove('active');
            console.log('Анимация Z');
        };
        
        btnX.onclick = () => {
            mv.animationName = 'x';
            btnX.classList.add('active');
            btnZ.classList.remove('active');
            console.log('Анимация X');
        };
        
        // Проверка загрузки модели
        mv.addEventListener('load', () => {
            console.log('Модель загружена');
            console.log('Доступные анимации:', mv.availableAnimations);
            
            // Если есть анимация z - активируем кнопку
            const animations = mv.availableAnimations || [];
            if (animations.includes('z')) {
                btnZ.classList.add('active');
            } else if (animations.includes('x')) {
                btnX.classList.add('active');
            } else if (animations.length > 0) {
                mv.animationName = animations[0];
                if (animations[0] === 'z') btnZ.classList.add('active');
                else if (animations[0] === 'x') btnX.classList.add('active');
            }
        });
        
        mv.addEventListener('error', () => {
            console.error('Ошибка: файл CUP.glb не найден!');
        });
    </script>
</body>
</html>
