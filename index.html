<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            text-align: center;
        }
        
        #controls {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        
        button {
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-z {
            background: #4CAF50;
            color: white;
        }
        
        .btn-x {
            background: #2196F3;
            color: white;
        }
        
        button.active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff5500;
        }
    </style>
</head>
<body>
    <div id="status">
        🔄 Проверка загрузки модели...
    </div>
    
    <div id="controls">
        <button id="btnZ" class="btn-z">🎬 Анимация Z</button>
        <button id="btnX" class="btn-x">🏃 Анимация X</button>
    </div>

    <model-viewer 
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        animation-crossfade-duration="300"
        shadow-intensity="1"
        exposure="1"
        camera-orbit="0deg 75deg 5m"
        min-camera-orbit="auto auto 2m"
        max-camera-orbit="auto auto 10m"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        (() => {
            const mv = document.getElementById('mv');
            const status = document.getElementById('status');
            const btnZ = document.getElementById('btnZ');
            const btnX = document.getElementById('btnX');
            
            let animations = [];
            
            function updateStatus(message, isError = false) {
                status.textContent = message;
                status.style.background = isError ? 'rgba(255,0,0,0.9)' : 'rgba(0,0,0,0.85)';
                console.log(message);
            }
            
            function updateActiveButton(animName) {
                if (animName === 'z') {
                    btnZ.classList.add('active');
                    btnX.classList.remove('active');
                } else if (animName === 'x') {
                    btnX.classList.add('active');
                    btnZ.classList.remove('active');
                }
            }
            
            mv.addEventListener('load', () => {
                updateStatus('✅ Модель загружена! Проверяю анимации...');
                
                try {
                    animations = mv.availableAnimations || [];
                    console.log('Доступные анимации:', animations);
                    
                    if (animations.length > 0) {
                        updateStatus(`✅ Найдено анимаций: ${animations.length} (${animations.join(', ')})`);
                        
                        if (animations.includes('z')) {
                            mv.animationName = 'z';
                            updateActiveButton('z');
                        } else if (animations.includes('x')) {
                            mv.animationName = 'x';
                            updateActiveButton('x');
                        } else if (animations.length > 0) {
                            mv.animationName = animations[0];
                        }
                    } else {
                        updateStatus('⚠️ Модель загружена, но анимации не найдены');
                    }
                } catch (e) {
                    console.error('Ошибка:', e);
                    updateStatus('❌ Ошибка при чтении анимаций', true);
                }
            });
            
            mv.addEventListener('error', (error) => {
                console.error('Ошибка:', error);
                updateStatus('❌ Ошибка! Файл CUP.glb не найден или поврежден', true);
            });
            
            btnZ.addEventListener('click', () => {
                mv.animationName = 'z';
                updateActiveButton('z');
                updateStatus('🎬 Анимация: Z');
            });
            
            btnX.addEventListener('click', () => {
                mv.animationName = 'x';
                updateActiveButton('x');
                updateStatus('🎬 Анимация: X');
            });
            
            console.log('Путь к модели:', mv.src);
            updateStatus(`🔍 Загружаю: ${mv.src}`);
        })();
    </script>
</body>
</html>
