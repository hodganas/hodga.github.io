<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            text-align: center;
        }
        
        #controls {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-z {
            background: #4CAF50;
            color: white;
        }
        
        .btn-x {
            background: #2196F3;
            color: white;
        }
        
        .btn-stop {
            background: #f44336;
            color: white;
        }
        
        .btn-outline {
            background: #ff9800;
            color: white;
        }
        
        .btn-pixel {
            background: #9c27b0;
            color: white;
        }
        
        button.active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff5500;
        }
    </style>
</head>
<body>
    <div id="status">
        Загрузка модели CUP.glb...
    </div>
    
    <div id="controls">
        <button id="btnZ" class="btn-z">Анимация Z</button>
        <button id="btnX" class="btn-x">Анимация X</button>
        <button id="btnStop" class="btn-stop">Стоп</button>
        <button id="btnOutline" class="btn-outline">Контур</button>
        <button id="btnPixel" class="btn-pixel">Пикселизация</button>
    </div>

    <model-viewer 
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        animation-crossfade-duration="300"
        shadow-intensity="1"
        exposure="1"
        camera-orbit="0deg 75deg 5m"
        min-camera-orbit="auto auto 2m"
        max-camera-orbit="auto auto 10m"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        (() => {
            const mv = document.getElementById('mv');
            const status = document.getElementById('status');
            const btnZ = document.getElementById('btnZ');
            const btnX = document.getElementById('btnX');
            const btnStop = document.getElementById('btnStop');
            const btnOutline = document.getElementById('btnOutline');
            const btnPixel = document.getElementById('btnPixel');
            
            let animations = [];
            let isOutlineActive = false;
            let isPixelActive = false;
            
            function updateStatus(message, isError = false) {
                status.textContent = message;
                status.style.background = isError ? 'rgba(255,0,0,0.9)' : 'rgba(0,0,0,0.85)';
                console.log(message);
            }
            
            function updateActiveButton(animName) {
                if (animName === 'z') {
                    btnZ.classList.add('active');
                    btnX.classList.remove('active');
                    btnStop.classList.remove('active');
                } else if (animName === 'x') {
                    btnX.classList.add('active');
                    btnZ.classList.remove('active');
                    btnStop.classList.remove('active');
                } else if (animName === null || animName === '') {
                    btnStop.classList.add('active');
                    btnZ.classList.remove('active');
                    btnX.classList.remove('active');
                }
            }
            
            // Эффект контура через изменение настроек модели
            function toggleOutline() {
                if (isOutlineActive) {
                    mv.setAttribute('shadow-intensity', '1');
                    mv.setAttribute('exposure', '1');
                    isOutlineActive = false;
                    btnOutline.classList.remove('active');
                    updateStatus('Контур выключен');
                } else {
                    mv.setAttribute('shadow-intensity', '0');
                    mv.setAttribute('exposure', '1.5');
                    isOutlineActive = true;
                    btnOutline.classList.add('active');
                    updateStatus('Контур включен (увеличенная яркость)');
                }
            }
            
            // Эффект пикселизации через масштабирование
            function togglePixel() {
                if (isPixelActive) {
                    mv.setAttribute('scale', '1 1 1');
                    isPixelActive = false;
                    btnPixel.classList.remove('active');
                    updateStatus('Пикселизация выключена');
                } else {
                    mv.setAttribute('scale', '0.15 0.15 0.15');
                    isPixelActive = true;
                    btnPixel.classList.add('active');
                    updateStatus('Пикселизация включена (уменьшенный масштаб)');
                }
            }
            
            function stopAnimation() {
                mv.animationName = null;
                updateActiveButton(null);
                updateStatus('Анимация остановлена');
            }
            
            mv.addEventListener('load', () => {
                updateStatus('Модель CUP.glb загружена');
                
                try {
                    animations = mv.availableAnimations || [];
                    console.log('Доступные анимации:', animations);
                    
                    if (animations.length > 0) {
                        updateStatus(`Найдено анимаций: ${animations.length} (${animations.join(', ')})`);
                        
                        if (animations.includes('z')) {
                            mv.animationName = 'z';
                            updateActiveButton('z');
                            updateStatus('Запущена анимация: Z');
                        } else if (animations.includes('x')) {
                            mv.animationName = 'x';
                            updateActiveButton('x');
                            updateStatus('Запущена анимация: X');
                        } else if (animations.length > 0) {
                            mv.animationName = animations[0];
                            updateStatus(`Запущена анимация: ${animations[0]}`);
                        }
                    } else {
                        updateStatus('Модель загружена, но анимации не найдены');
                    }
                } catch (e) {
                    console.error('Ошибка:', e);
                    updateStatus('Ошибка при чтении анимаций', true);
                }
            });
            
            mv.addEventListener('error', (error) => {
                console.error('Ошибка загрузки:', error);
                updateStatus('Файл CUP.glb не найден!', true);
            });
            
            btnZ.addEventListener('click', () => {
                mv.animationName = 'z';
                updateActiveButton('z');
                updateStatus('Анимация: Z');
            });
            
            btnX.addEventListener('click', () => {
                mv.animationName = 'x';
                updateActiveButton('x');
                updateStatus('Анимация: X');
            });
            
            btnStop.addEventListener('click', () => {
                stopAnimation();
            });
            
            btnOutline.addEventListener('click', () => {
                toggleOutline();
            });
            
            btnPixel.addEventListener('click', () => {
                togglePixel();
            });
            
            console.log('Модель: CUP.glb');
        })();
    </script>
</body>
</html>
