<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            position: relative;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            text-align: center;
        }
        
        #controls {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-z {
            background: #4CAF50;
            color: white;
        }
        
        .btn-x {
            background: #2196F3;
            color: white;
        }
        
        .btn-stop {
            background: #f44336;
            color: white;
        }
        
        .btn-outline {
            background: #ff9800;
            color: white;
        }
        
        .btn-pixel {
            background: #9c27b0;
            color: white;
        }
        
        button.active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ff5500;
        }
        
        /* Слой для пикселизации */
        .pixel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: none;
        }
        
        .pixel-overlay.active {
            display: block;
        }
        
        .pixel-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="status">
        Загрузка модели CUP.glb...
    </div>
    
    <div id="controls">
        <button id="btnZ" class="btn-z">Анимация Z</button>
        <button id="btnX" class="btn-x">Анимация X</button>
        <button id="btnStop" class="btn-stop">Стоп</button>
        <button id="btnOutline" class="btn-outline">Контур</button>
        <button id="btnPixel" class="btn-pixel">Пикселизация</button>
    </div>
    
    <div class="pixel-overlay" id="pixelOverlay">
        <canvas id="pixelCanvas" class="pixel-canvas"></canvas>
    </div>

    <model-viewer 
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        animation-crossfade-duration="300"
        shadow-intensity="1"
        exposure="1"
        camera-orbit="0deg 75deg 5m"
        min-camera-orbit="auto auto 2m"
        max-camera-orbit="auto auto 10m"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        (() => {
            const mv = document.getElementById('mv');
            const status = document.getElementById('status');
            const btnZ = document.getElementById('btnZ');
            const btnX = document.getElementById('btnX');
            const btnStop = document.getElementById('btnStop');
            const btnOutline = document.getElementById('btnOutline');
            const btnPixel = document.getElementById('btnPixel');
            const pixelOverlay = document.getElementById('pixelOverlay');
            const pixelCanvas = document.getElementById('pixelCanvas');
            
            let animations = [];
            let isOutlineActive = false;
            let isPixelActive = false;
            let pixelInterval = null;
            
            function updateStatus(message, isError = false) {
                status.textContent = message;
                status.style.background = isError ? 'rgba(255,0,0,0.9)' : 'rgba(0,0,0,0.85)';
                console.log(message);
            }
            
            function updateActiveButton(animName) {
                if (animName === 'z') {
                    btnZ.classList.add('active');
                    btnX.classList.remove('active');
                    btnStop.classList.remove('active');
                } else if (animName === 'x') {
                    btnX.classList.add('active');
                    btnZ.classList.remove('active');
                    btnStop.classList.remove('active');
                } else if (animName === null || animName === '') {
                    btnStop.classList.add('active');
                    btnZ.classList.remove('active');
                    btnX.classList.remove('active');
                }
            }
            
            // Эффект контура через CSS фильтр
            function toggleOutline() {
                if (isOutlineActive) {
                    mv.style.filter = 'none';
                    isOutlineActive = false;
                    btnOutline.classList.remove('active');
                    updateStatus('Контур выключен');
                } else {
                    mv.style.filter = 'drop-shadow(0 0 2px red) drop-shadow(0 0 2px red) drop-shadow(0 0 2px red)';
                    isOutlineActive = true;
                    btnOutline.classList.add('active');
                    updateStatus('Контур включен');
                }
            }
            
            // Настоящая пикселизация через canvas
            function applyPixelation(ctx, width, height, pixelSize) {
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                
                // Уменьшаем размер
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                const smallWidth = Math.floor(width / pixelSize);
                const smallHeight = Math.floor(height / pixelSize);
                
                tempCanvas.width = smallWidth;
                tempCanvas.height = smallHeight;
                tempCtx.drawImage(pixelCanvas, 0, 0, smallWidth, smallHeight);
                
                // Увеличиваем обратно с пиксельным эффектом
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(tempCanvas, 0, 0, width, height);
            }
            
            function startPixelation() {
                if (pixelInterval) clearInterval(pixelInterval);
                
                pixelOverlay.classList.add('active');
                
                const captureAndPixelate = () => {
                    try {
                        // Получаем область model-viewer
                        const rect = mv.getBoundingClientRect();
                        pixelCanvas.width = rect.width;
                        pixelCanvas.height = rect.height;
                        pixelCanvas.style.width = rect.width + 'px';
                        pixelCanvas.style.height = rect.height + 'px';
                        
                        // Рисуем снимок model-viewer
                        const ctx = pixelCanvas.getContext('2d');
                        ctx.drawImage(mv, 0, 0, rect.width, rect.height);
                        
                        // Применяем пикселизацию (размер пикселя 8px)
                        const imageData = ctx.getImageData(0, 0, rect.width, rect.height);
                        const pixelSize = 12;
                        
                        const tempCanvas = document.createElement('canvas');
                        const tempCtx = tempCanvas.getContext('2d');
                        const smallWidth = Math.floor(rect.width / pixelSize);
                        const smallHeight = Math.floor(rect.height / pixelSize);
                        
                        tempCanvas.width = smallWidth;
                        tempCanvas.height = smallHeight;
                        tempCtx.drawImage(pixelCanvas, 0, 0, smallWidth, smallHeight);
                        
                        ctx.imageSmoothingEnabled = false;
                        ctx.drawImage(tempCanvas, 0, 0, rect.width, rect.height);
                    } catch(e) {
                        console.log('Ошибка пикселизации:', e);
                    }
                };
                
                captureAndPixelate();
                pixelInterval = setInterval(captureAndPixelate, 100);
            }
            
            function stopPixelation() {
                if (pixelInterval) {
                    clearInterval(pixelInterval);
                    pixelInterval = null;
                }
                pixelOverlay.classList.remove('active');
            }
            
            function togglePixel() {
                if (isPixelActive) {
                    stopPixelation();
                    isPixelActive = false;
                    btnPixel.classList.remove('active');
                    updateStatus('Пикселизация выключена');
                } else {
                    startPixelation();
                    isPixelActive = true;
                    btnPixel.classList.add('active');
                    updateStatus('Пикселизация включена (размер пикселя 12px)');
                }
            }
            
            function stopAnimation() {
                mv.animationName = null;
                updateActiveButton(null);
                updateStatus('Анимация остановлена');
            }
            
            mv.addEventListener('load', () => {
                updateStatus('Модель CUP.glb загружена');
                
                try {
                    animations = mv.availableAnimations || [];
                    console.log('Доступные анимации:', animations);
                    
                    if (animations.length > 0) {
                        updateStatus(`Найдено анимаций: ${animations.length} (${animations.join(', ')})`);
                        
                        if (animations.includes('z')) {
                            mv.animationName = 'z';
                            updateActiveButton('z');
                            updateStatus('Запущена анимация: Z');
                        } else if (animations.includes('x')) {
                            mv.animationName = 'x';
                            updateActiveButton('x');
                            updateStatus('Запущена анимация: X');
                        } else if (animations.length > 0) {
                            mv.animationName = animations[0];
                            updateStatus(`Запущена анимация: ${animations[0]}`);
                        }
                    } else {
                        updateStatus('Модель загружена, но анимации не найдены');
                    }
                } catch (e) {
                    console.error('Ошибка:', e);
                    updateStatus('Ошибка при чтении анимаций', true);
                }
            });
            
            mv.addEventListener('error', (error) => {
                console.error('Ошибка загрузки:', error);
                updateStatus('Файл CUP.glb не найден! Проверьте, что файл лежит в той же папке', true);
            });
            
            btnZ.addEventListener('click', () => {
                mv.animationName = 'z';
                updateActiveButton('z');
                updateStatus('Анимация: Z');
            });
            
            btnX.addEventListener('click', () => {
                mv.animationName = 'x';
                updateActiveButton('x');
                updateStatus('Анимация: X');
            });
            
            btnStop.addEventListener('click', () => {
                stopAnimation();
            });
            
            btnOutline.addEventListener('click', () => {
                toggleOutline();
            });
            
            btnPixel.addEventListener('click', () => {
                togglePixel();
            });
            
            console.log('Модель: CUP.glb');
        })();
    </script>
</body>
</html>
