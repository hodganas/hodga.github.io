<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Поддержка import maps для Safari -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>
    
    <!-- Import map для Three.js - нужна совместимая версия -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <!-- model-viewer 3.5.0 с Google CDN (эффекты уже внутри) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 18px;
            cursor: pointer;
            background: #ffffff;
            color: #333;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button.active {
            background: #ff5500;
            color: white;
        }
        
        .effect-btn {
            background: #4a4a4a;
            color: white;
        }
        
        .effect-btn.active {
            background: #ff5500;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="btnZ">Анимация Z</button>
        <button id="btnX">Анимация X</button>
        <button id="outlineBtn" class="effect-btn">Контур</button>
        <button id="pixelBtn" class="effect-btn">Пикселизация</button>
    </div>

    <model-viewer
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        animation-crossfade-duration="300"
        shadow-intensity="1"
        exposure="1"
        camera-orbit="0deg 75deg 5m"
        style="background-color: #f5f5f5;">
        
        <effect-composer>
            <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
            <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
        </effect-composer>
    </model-viewer>

    <script type="module">
        // Ждем загрузки model-viewer
        await customElements.whenDefined('model-viewer');
        
        const mv = document.getElementById('mv');
        const btnZ = document.getElementById('btnZ');
        const btnX = document.getElementById('btnX');
        const outlineBtn = document.getElementById('outlineBtn');
        const pixelBtn = document.getElementById('pixelBtn');
        
        let isOutlineActive = false;
        let isPixelActive = false;
        
        // Получаем эффекты после загрузки модели
        mv.addEventListener('load', () => {
            console.log('Модель загружена');
            console.log('Доступные анимации:', mv.availableAnimations);
            
            // Активируем кнопку Z если анимация есть
            if (mv.availableAnimations?.includes('z')) {
                btnZ.classList.add('active');
            }
        });
        
        mv.addEventListener('error', () => {
            console.error('Ошибка: файл CUP.glb не найден');
        });
        
        // Эффекты - получаем их из model-viewer
        const outlineEffect = document.getElementById('outlineEffect');
        const pixelEffect = document.getElementById('pixelEffect');
        
        // Переключение контура
        outlineBtn.onclick = () => {
            if (isOutlineActive) {
                if (outlineEffect) outlineEffect.blendMode = 'skip';
                isOutlineActive = false;
                outlineBtn.classList.remove('active');
            } else {
                if (outlineEffect) outlineEffect.blendMode = 'default';
                isOutlineActive = true;
                outlineBtn.classList.add('active');
            }
        };
        
        // Переключение пикселизации
        pixelBtn.onclick = () => {
            if (isPixelActive) {
                if (pixelEffect) pixelEffect.blendMode = 'skip';
                isPixelActive = false;
                pixelBtn.classList.remove('active');
            } else {
                if (pixelEffect) pixelEffect.blendMode = 'default';
                isPixelActive = true;
                pixelBtn.classList.add('active');
            }
        };
        
        // Анимации
        btnZ.onclick = () => {
            mv.animationName = 'z';
            btnZ.classList.add('active');
            btnX.classList.remove('active');
        };
        
        btnX.onclick = () => {
            mv.animationName = 'x';
            btnX.classList.add('active');
            btnZ.classList.remove('active');
        };
    </script>
</body>
</html>
