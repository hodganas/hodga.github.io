<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Подключаем model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
            transition: all 0.2s ease;
        }
        
        /* Усиленный эффект контура - яркое красное свечение */
        model-viewer.outline {
            filter: drop-shadow(0 0 5px red) 
                    drop-shadow(0 0 10px red) 
                    drop-shadow(0 0 15px red)
                    drop-shadow(0 0 20px rgba(255,0,0,0.5));
        }
        
        /* Усиленный эффект пикселизации - крупные пиксели */
        model-viewer.pixel {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: optimizeSpeed;
            transform: scale(0.98);
            filter: contrast(1.2) saturate(1.1);
        }
        
        /* Комбо эффект - контур + пикселизация */
        model-viewer.outline.pixel {
            filter: drop-shadow(0 0 5px red) 
                    drop-shadow(0 0 10px red) 
                    drop-shadow(0 0 15px red)
                    contrast(1.2) 
                    saturate(1.1);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #ffffff;
            color: #333;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button.active {
            background: #ff5500;
            color: white;
            box-shadow: 0 0 10px rgba(255,85,0,0.5);
        }
        
        .effect-btn {
            background: #4a4a4a;
            color: white;
        }
        
        .effect-btn.active {
            background: #ff5500;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,85,0,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255,85,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,85,0,0); }
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="btnZ">Анимация Z</button>
        <button id="btnX">Анимация X</button>
        <button id="outlineBtn" class="effect-btn">🔴 Контур</button>
        <button id="pixelBtn" class="effect-btn">📺 Пикселизация</button>
    </div>

    <model-viewer
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        shadow-intensity="1"
        exposure="1"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        // Получаем элементы
        const mv = document.getElementById('mv');
        const btnZ = document.getElementById('btnZ');
        const btnX = document.getElementById('btnX');
        const outlineBtn = document.getElementById('outlineBtn');
        const pixelBtn = document.getElementById('pixelBtn');
        
        // Состояния эффектов
        let outlineActive = false;
        let pixelActive = false;
        
        // Контур (усиленный)
        outlineBtn.onclick = () => {
            if (outlineActive) {
                mv.classList.remove('outline');
                outlineBtn.classList.remove('active');
                outlineActive = false;
                console.log('Контур выключен');
            } else {
                mv.classList.add('outline');
                outlineBtn.classList.add('active');
                outlineActive = true;
                console.log('Контур включен (усиленный)');
            }
        };
        
        // Пикселизация (усиленная)
        pixelBtn.onclick = () => {
            if (pixelActive) {
                mv.classList.remove('pixel');
                pixelBtn.classList.remove('active');
                pixelActive = false;
                console.log('Пикселизация выключена');
            } else {
                mv.classList.add('pixel');
                pixelBtn.classList.add('active');
                pixelActive = true;
                console.log('Пикселизация включена (усиленная)');
            }
        };
        
        // Анимации
        btnZ.onclick = () => {
            mv.animationName = 'z';
            btnZ.classList.add('active');
            btnX.classList.remove('active');
            console.log('Анимация Z');
        };
        
        btnX.onclick = () => {
            mv.animationName = 'x';
            btnX.classList.add('active');
            btnZ.classList.remove('active');
            console.log('Анимация X');
        };
        
        // Проверка загрузки модели
        mv.addEventListener('load', () => {
            console.log('Модель загружена');
            console.log('Доступные анимации:', mv.availableAnimations);
            
            const animations = mv.availableAnimations || [];
            if (animations.includes('z')) {
                btnZ.classList.add('active');
            } else if (animations.includes('x')) {
                btnX.classList.add('active');
            } else if (animations.length > 0) {
                mv.animationName = animations[0];
                if (animations[0] === 'z') btnZ.classList.add('active');
                else if (animations[0] === 'x') btnX.classList.add('active');
            }
        });
        
        mv.addEventListener('error', () => {
            console.error('Ошибка: файл CUP.glb не найден!');
        });
    </script>
</body>
</html>
