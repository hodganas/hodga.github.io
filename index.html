<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Модель Кружка</title>
    
    <!-- Подключаем model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        /* Эффект контура для модели через outline (обводка самого элемента) */
        model-viewer.outline {
            outline: none;
            position: relative;
        }
        
        model-viewer.outline::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            box-shadow: inset 0 0 0 4px rgba(255, 0, 0, 0.8),
                        inset 0 0 0 8px rgba(255, 0, 0, 0.5),
                        inset 0 0 0 12px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        
        /* Альтернативный контур через border на canvas */
        model-viewer.outline canvas {
            outline: 4px solid red;
            outline-offset: 2px;
        }
        
        /* Эффект пикселизации для модели через canvas */
        model-viewer.pixel {
            filter: none;
        }
        
        model-viewer.pixel canvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: optimizeSpeed;
            filter: contrast(1.5) brightness(1.1);
        }
        
        /* Комбо эффект */
        model-viewer.outline.pixel canvas {
            outline: 4px solid red;
            outline-offset: 2px;
            image-rendering: pixelated;
            filter: contrast(1.5) brightness(1.1);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #ffffff;
            color: #333;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button.active {
            background: #ff5500;
            color: white;
            box-shadow: 0 0 10px rgba(255,85,0,0.5);
        }
        
        .effect-btn {
            background: #4a4a4a;
            color: white;
        }
        
        .effect-btn.active {
            background: #ff5500;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="btnZ">Анимация Z</button>
        <button id="btnX">Анимация X</button>
        <button id="outlineBtn" class="effect-btn">🔴 Контур модели</button>
        <button id="pixelBtn" class="effect-btn">📺 Пикселизация модели</button>
    </div>

    <model-viewer
        id="mv"
        src="CUP.glb"
        camera-controls
        autoplay
        animation-name="z"
        shadow-intensity="1"
        exposure="1"
        style="background-color: #f5f5f5;">
    </model-viewer>

    <script>
        // Получаем элементы
        const mv = document.getElementById('mv');
        const btnZ = document.getElementById('btnZ');
        const btnX = document.getElementById('btnX');
        const outlineBtn = document.getElementById('outlineBtn');
        const pixelBtn = document.getElementById('pixelBtn');
        
        // Состояния эффектов
        let outlineActive = false;
        let pixelActive = false;
        
        // Функция для применения эффектов к canvas модели
        function applyEffects() {
            const canvas = mv.querySelector('canvas');
            if (!canvas) return;
            
            if (outlineActive && pixelActive) {
                canvas.style.outline = '4px solid red';
                canvas.style.outlineOffset = '2px';
                canvas.style.imageRendering = 'pixelated';
                canvas.style.filter = 'contrast(1.5) brightness(1.1)';
            } else if (outlineActive) {
                canvas.style.outline = '4px solid red';
                canvas.style.outlineOffset = '2px';
                canvas.style.imageRendering = 'auto';
                canvas.style.filter = 'none';
            } else if (pixelActive) {
                canvas.style.outline = 'none';
                canvas.style.imageRendering = 'pixelated';
                canvas.style.filter = 'contrast(1.5) brightness(1.1)';
            } else {
                canvas.style.outline = 'none';
                canvas.style.imageRendering = 'auto';
                canvas.style.filter = 'none';
            }
        }
        
        // Контур модели
        outlineBtn.onclick = () => {
            if (outlineActive) {
                outlineActive = false;
                outlineBtn.classList.remove('active');
                console.log('Контур модели выключен');
            } else {
                outlineActive = true;
                outlineBtn.classList.add('active');
                console.log('Контур модели включен');
            }
            applyEffects();
        };
        
        // Пикселизация модели
        pixelBtn.onclick = () => {
            if (pixelActive) {
                pixelActive = false;
                pixelBtn.classList.remove('active');
                console.log('Пикселизация модели выключена');
            } else {
                pixelActive = true;
                pixelBtn.classList.add('active');
                console.log('Пикселизация модели включена');
            }
            applyEffects();
        };
        
        // Анимации
        btnZ.onclick = () => {
            mv.animationName = 'z';
            btnZ.classList.add('active');
            btnX.classList.remove('active');
            console.log('Анимация Z');
        };
        
        btnX.onclick = () => {
            mv.animationName = 'x';
            btnX.classList.add('active');
            btnZ.classList.remove('active');
            console.log('Анимация X');
        };
        
        // Следим за появлением canvas и применяем эффекты
        const observer = new MutationObserver(() => {
            const canvas = mv.querySelector('canvas');
            if (canvas) {
                applyEffects();
                observer.disconnect();
            }
        });
        
        observer.observe(mv, { childList: true, subtree: true });
        
        // Проверка загрузки модели
        mv.addEventListener('load', () => {
            console.log('Модель загружена');
            console.log('Доступные анимации:', mv.availableAnimations);
            
            const animations = mv.availableAnimations || [];
            if (animations.includes('z')) {
                btnZ.classList.add('active');
            } else if (animations.includes('x')) {
                btnX.classList.add('active');
            } else if (animations.length > 0) {
                mv.animationName = animations[0];
                if (animations[0] === 'z') btnZ.classList.add('active');
                else if (animations[0] === 'x') btnX.classList.add('active');
            }
            
            // Применяем эффекты к canvas
            setTimeout(() => applyEffects(), 100);
        });
        
        mv.addEventListener('error', () => {
            console.error('Ошибка: файл CUP.glb не найден!');
        });
    </script>
</body>
</html>
